# docker compose -p insider-one -f rabbitmq-compose.yml up -d
version: "3.9"
services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: insider-one-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_log:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  rabbitmq_data:
  rabbitmq_log:

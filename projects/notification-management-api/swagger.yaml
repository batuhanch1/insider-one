host: localhost:8080
info:
  contact: {}
  description: REST API for managing email, SMS, and push notifications
  title: Notification Management API
  version: "1.0"
paths:
  /api/v1/email/:
    get:
      description: List email notifications with optional date and status filters
      parameters:
      - description: Status filter
        enum:
        - PENDING
        - SENT
        in: query
        name: status
        required: true
        type: string
      - description: Page number
        in: query
        minimum: 1
        name: page
        required: true
        type: integer
      - description: Page size
        in: query
        maximum: 50
        minimum: 0
        name: page_size
        required: true
        type: integer
      - description: Start date (RFC3339)
        in: query
        name: create_date
        type: string
      - description: End date (RFC3339)
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/email.GetAllEmailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/error_handling.Errors'
      security:
      - ApiKeyAuth: []
      summary: List emails
      tags:
      - email
    post:
      consumes:
      - application/json
      description: Queue a single email notification
      parameters:
      - description: Send Email Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/email.SendEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
